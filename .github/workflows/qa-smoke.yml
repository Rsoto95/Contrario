# Scheduled smoke test — runs the Playwright suite against the app under test.
#
# This workflow has no push/PR triggers — it runs daily on its schedule and
# can be started manually from the Actions tab ("Run workflow"). Tests tagged
# @flaky in their title are excluded — tag a test @flaky to quarantine it
# without deleting it.
#
# Configure these in the repo's Settings → Secrets and variables → Actions.
#   Secrets:
#     APP_USERNAME
#     APP_PASSWORD
#     CHERRY_API_KEY             (cherry_sk_...)
#   Variables:
#     BASE_URL                   app under test, e.g. https://app.example.com
#     CHERRY_API_URL             e.g. https://cherry.example.com
#     CHERRY_PROJECT_SHORT_CODE  e.g. CN

name: E2E Smoke

on:
  schedule:
    - cron: "0 10 * * *" # 10:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

defaults:
  run:
    working-directory: playwright

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      # Capture Playwright's exit code instead of failing here, so the JSON
      # report always gets produced and uploaded. The "Fail if tests failed"
      # step at the end re-applies the real result.
      - name: Run smoke tests
        id: tests
        env:
          CI: "true"
          BASE_URL: ${{ vars.BASE_URL }}
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          set +e
          npx playwright test --grep-invert "@flaky"
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      # Send results to Cherry. Runs even when tests failed — a run with
      # failures is exactly what we want recorded. The script never fails the
      # job: any upload problem is logged as a warning and it exits 0.
      - name: Upload results to Cherry
        if: always()
        env:
          CHERRY_API_URL: ${{ vars.CHERRY_API_URL }}
          CHERRY_PROJECT_SHORT_CODE: ${{ vars.CHERRY_PROJECT_SHORT_CODE }}
          CHERRY_API_KEY: ${{ secrets.CHERRY_API_KEY }}
          CHERRY_RUN_NAME: "E2E Smoke"
        run: node scripts/upload-results-to-cherry.js

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: playwright/test-results/junit.xml
          if-no-files-found: warn

      - name: Upload Monocart report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monocart-report
          path: playwright/monocart-report
          if-no-files-found: warn

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/playwright-report
          if-no-files-found: warn

      # The test step always exits 0 so the report/upload steps run;
      # this step makes the run red when tests actually failed.
      - name: Fail if tests failed
        if: always()
        run: |
          code="${{ steps.tests.outputs.exit_code }}"
          if [ "$code" != "0" ]; then
            echo "Playwright tests failed (exit code $code)."
            exit 1
          fi
