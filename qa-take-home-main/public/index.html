<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ATS — Submit Candidate</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
      h1 { font-size: 1.25rem; }
      label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; font-size: 0.9rem; }
      input, select, textarea { width: 100%; padding: 0.5rem; box-sizing: border-box; }
      button { margin-top: 1rem; padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; }
      pre { background: #f4f4f4; padding: 1rem; overflow: auto; white-space: pre-wrap; }
      .status { font-weight: 700; }
    </style>
  </head>
  <body>
    <h1>Submit Candidate</h1>

    <label for="userId">Recruiter (x-user-id header)</label>
    <select id="userId">
      <option value="u_recruiter_direct">u_recruiter_direct (direct access to job_active/job_exclusive)</option>
      <option value="u_recruiter_selfserve">u_recruiter_selfserve (no access, self-serve)</option>
      <option value="u_recruiter_agency">u_recruiter_agency (no access, agency)</option>
      <option value="u_non_recruiter">u_non_recruiter (not a recruiter)</option>
      <option value="u_recruiter_autoapprove">u_recruiter_autoapprove (auto-approve, direct to job_kombo)</option>
      <option value="u_recruiter_bypass1">u_recruiter_bypass1 (bypass quota 1)</option>
      <option value="u_recruiter_bypass0">u_recruiter_bypass0 (bypass quota 0)</option>
    </select>

    <label for="jobId">Role</label>
    <select id="jobId">
      <option value="job_active">job_active</option>
      <option value="job_inactive">job_inactive</option>
      <option value="job_deleted">job_deleted</option>
      <option value="job_exclusive">job_exclusive</option>
      <option value="job_kombo">job_kombo</option>
    </select>

    <label for="name">Candidate name</label>
    <input id="name" value="Alan Turing" />

    <label for="email">Email</label>
    <input id="email" value="Alan@Example.com" />

    <label for="linkedin">LinkedIn</label>
    <input id="linkedin" value="https://linkedin.com/in/alan" />

    <label for="resumeTempKey">Résumé temp key (leave blank to rely on résumé on file)</label>
    <input id="resumeTempKey" value="temp-bucket/upload-123.pdf" />

    <label for="answer">Screening answer</label>
    <textarea id="answer" rows="3">I have 5 years of experience.</textarea>

    <button id="submit">Submit</button>

    <h2>Result</h2>
    <p class="status" id="status"></p>
    <pre id="result"></pre>

    <script>
      document.getElementById('submit').addEventListener('click', async () => {
        const userId = document.getElementById('userId').value;
        const body = {
          jobId: document.getElementById('jobId').value,
          candidate: {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            linkedin: document.getElementById('linkedin').value || undefined,
            resumeTempKey: document.getElementById('resumeTempKey').value || undefined,
            resumeFileName: 'resume.pdf',
          },
          screeningAnswers: [
            { type: 'QUESTION', answer: document.getElementById('answer').value },
          ],
        };
        const statusEl = document.getElementById('status');
        const resultEl = document.getElementById('result');
        try {
          const res = await fetch('/ats/submit-candidate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-user-id': userId },
            body: JSON.stringify(body),
          });
          statusEl.textContent = 'HTTP ' + res.status;
          const json = await res.json();
          resultEl.textContent = JSON.stringify(json, null, 2);
        } catch (err) {
          statusEl.textContent = 'Request failed';
          resultEl.textContent = String(err);
        }
      });
    </script>
  </body>
</html>
